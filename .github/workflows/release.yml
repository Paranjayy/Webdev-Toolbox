name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build All Bundles
        run: bash release.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/Webdev-Toolbox-Safari.zip
            releases/Webdev-Toolbox-Chrome.zip
            releases/Webdev-Toolbox-Firefox.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
